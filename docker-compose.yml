services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: jobplatform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DB_NAME: jobplatform
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: "5432"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py makemigrations users jobs &&
             python manage.py migrate &&
             python manage.py seed &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      # Vite proxies /api and /media to the backend (browser stays on :5173 → PDF iframes work).
      VITE_PROXY_TARGET: http://backend:8000

volumes:
  postgres_data:
